name: CI

on:
  push:
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Cache Zig
        uses: actions/cache@v4
        with:
          path: zig-x86_64-linux-0.16.0
          key: zig-0.16.0-linux

      - name: Install Zig
        env:
          ZIG_VERSION: "0.16.0"
        run: |
          if [ ! -d "zig-x86_64-linux-${ZIG_VERSION}" ]; then
            curl -L -o zig.tar.xz "https://ziglang.org/download/${ZIG_VERSION}/zig-x86_64-linux-${ZIG_VERSION}.tar.xz"
            tar -xf zig.tar.xz
          fi
          echo "$PWD/zig-x86_64-linux-${ZIG_VERSION}" >> "$GITHUB_PATH"

      - name: Check formatting
        run: zig fmt --check .

      - name: Build
        run: zig build

      - name: Run tests
        run: zig build test

name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Zig
        uses: mlugg/setup-zig@v1
        with:
          version: "0.16.0"

      - name: Verify build.zig.zon version matches tag
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          ZON_VERSION=$(grep -oP '^\s*\.version\s*=\s*"\K[^"]+' build.zig.zon)

          if [ -z "$ZON_VERSION" ]; then
            echo "Could not find .version in build.zig.zon" >&2
            exit 1
          fi

          if [ "$TAG_VERSION" != "$ZON_VERSION" ]; then
            echo "Version mismatch: tag is v$TAG_VERSION but build.zig.zon has $ZON_VERSION" >&2
            exit 1
          fi

          echo "Version check passed: $ZON_VERSION"

      - name: Extract changelog section
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          awk -v ver="$VERSION" '
            BEGIN { found=0 }
            $0 ~ "^## \\[" ver "\\]" { found=1; next }
            found && /^## \[/ { exit }
            found { print }
          ' CHANGELOG.md > release_body.md

          if [ ! -s release_body.md ]; then
            echo "No changelog section found for $VERSION" >&2
            exit 1
          fi

      - name: Build Windows executable
        run: zig build -Dtarget=x86_64-windows -Doptimize=ReleaseFast

      - name: Zip Windows build
        run: |
          cd zig-out/bin
          zip lsz-windows-x86_64.zip lsz.exe
          mv lsz-windows-x86_64.zip "$GITHUB_WORKSPACE/"

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          body_path: release_body.md
          files: lsz-windows-x86_64.zip
